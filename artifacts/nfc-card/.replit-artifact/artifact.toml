kind = "web"
previewPath = "/"
title = "Smart NFC Digital Card"
version = "1.0.0"
id = "artifacts/nfc-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20216

[services.development]
run = "pnpm --filter @workspace/nfc-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nfc-card", "run", "build" ]
publicDir = "artifacts/nfc-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20216"
BASE_PATH = "/"
